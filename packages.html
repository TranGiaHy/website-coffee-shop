<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đóng Gói - Coffee Shop</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="packages">
    <header>
      <a href="index.html" class="logo-link">
        <div class="logo">
          <img src="img/logo.png" alt="Logo" />
          <h2>COFFEE SHOP</h2>
        </div>
      </a>

      <div class="user-actions">
        <a href="cart.html">🛒 Giỏ hàng (<span id="cart-count">0</span>)</a>
        <span id="user-menu" class="user-menu-wrapper">
          <a href="#" class="user-trigger">
            👤 <span id="username-display">Đăng nhập</span>
          </a>
          <div id="user-dropdown" class="user-dropdown-content"></div>
        </span>
      </div>
    </header>

    <nav>
      <a href="index.html">TRANG CHỦ</a>
      <a href="menu.html">THỨC UỐNG</a>
      <a href="packages.html" style="color: var(--primary-green)"
        >SẢN PHẨM ĐÓNG GÓI</a
      >
      <a
        href="admin.html"
        id="admin-link"
        style="color: var(--danger-red); display: none"
        >Quản Lý Sản Phẩm</a
      >
    </nav>

    <div class="container">
      <h2 class="section-title">SẢN PHẨM ĐÓNG GÓI MANG VỀ</h2>
      <div class="search-bar-container">
        <input
          type="text"
          id="search-input"
          placeholder="Tìm kiếm sản phẩm..."
          oninput="renderProducts()"
        />
        <select id="filter-price" onchange="renderProducts()">
          <option value="all">Tất cả giá</option>
          <option value="asc">Giá: Thấp đến Cao</option>
          <option value="desc">Giá: Cao đến Thấp</option>
        </select>
      </div>
      <div class="product-grid" id="product-list"></div>
    </div>

    <div id="toast"></div>
    <script src="js/main.js"></script>
    <div id="editProfileModal" class="modal-overlay">
      <div class="modal-content">
        <h2>Cập nhật thông tin</h2>

        <label>Họ và tên:</label>
        <input type="text" id="edit-user-name" class="modal-input" />

        <label>Số điện thoại:</label>
        <input type="text" id="edit-user-phone" class="modal-input" />

        <label>Địa chỉ giao hàng:</label>
        <input type="text" id="edit-user-addr" class="modal-input" />

        <div class="modal-buttons">
          <button class="btn-primary" onclick="saveProfile()">LƯU</button>
          <button class="btn-danger" onclick="document.getElementById('editProfileModal').style.display = 'none'">HỦY</button>
        </div>
      </div>
    </div>
  </body>
</html>
