<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="form-container">
      <h2 class="form-title">ĐĂNG KÝ</h2>
      
      <input type="text" id="name" placeholder="Họ tên" required />
      <input type="email" id="email" placeholder="Email" required />
      
      <div class="password-wrapper">
        <input type="password" id="pass" placeholder="Mật khẩu" required />
        <span class="toggle-password" onclick="togglePassword('pass')">👁️</span>
      </div>

      <div class="password-wrapper">
        <input type="password" id="confirm-pass" placeholder="Xác nhận mật khẩu" required />
        <span class="toggle-password" onclick="togglePassword('confirm-pass')">👁️</span>
      </div>

      <button onclick="register()">ĐĂNG KÝ</button>
      
      <p class="auth-link">
        <a href="login.html">Đã có tài khoản? Đăng nhập</a>
      </p>
    </div>
    
    <script src="js/register.js"></script>
  </body>
</html>
