<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <a href="index.html" class="logo-link">
        <div class="logo">
          <img src="img/logo.png" alt="Coffee Shop Logo" />
          <h2>COFFEE SHOP</h2>
        </div>
      </a>
      <div class="user-actions">
        <a href="index.html">← Trở về</a>
        <a href="cart.html">🛒 Giỏ hàng (<span id="cart-count">0</span>)</a>
      </div>
    </header>

    <div class="container">
      <div class="detail-wrapper">
        <div class="detail-image-box">
          <img id="detail-img" src="" alt="Hình ảnh sản phẩm" />
        </div>
        <div class="detail-info-box">
          <h1 id="detail-name" class="detail-title"></h1>
          <h2 id="detail-price" class="detail-price-text"></h2>
          <p id="detail-desc" class="detail-desc"></p>
          <button
            class="btn-primary btn-add-to-cart-large"
            onclick="addCurrentToCart()"
          >
            🛒 THÊM VÀO GIỎ HÀNG
          </button>
        </div>
      </div>
    </div>

    <div id="toast"></div>
    
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/detail.js"></script>
  </body>
</html>
