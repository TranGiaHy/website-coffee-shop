<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <a href="index.html" class="logo-link">
        <div class="logo">
          <img src="img/logo.png" alt="Coffee Shop Logo" />
          <h2>COFFEE SHOP</h2>
        </div>
      </a>
      <div class="user-actions">
        <a href="index.html">← Tiếp tục mua hàng</a>
      </div>
    </header>

    <div class="container">
      <h2 class="section-title">Giỏ hàng</h2>

      <div id="cart-empty" class="cart-empty-message">Giỏ hàng trống.</div>

      <table class="data-table" id="cart-table">
        <thead>
          <tr>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="cart-body"></tbody>
      </table>

      <h3 class="cart-total-wrapper">
        Tổng cộng:
        <span id="cart-total" class="cart-total-price">0 đ</span>
      </h3>

      <div class="form-container checkout-form-container" id="checkout-section">
        <h3 class="checkout-form-title">Thông tin giao hàng</h3>
        <input type="text" id="cus-name" placeholder="Họ và tên" required />
        <input
          type="text"
          id="cus-phone"
          placeholder="Số điện thoại"
          required
        />
        <input
          type="text"
          id="cus-address"
          placeholder="Địa chỉ giao hàng"
          required
        />

        <select class="checkout-select" id="pay-method">
          <option value="Thanh toán khi nhận hàng (COD)">Thanh toán khi nhận hàng (COD)</option>
          <option value="Thẻ Visa/Chuyển khoản QR">Thẻ Visa/Chuyển khoản (Momo, VNPay)</option>
        </select>

        <button onclick="processCheckout()">XÁC NHẬN THANH TOÁN</button>
      </div>
    </div>

    <!-- UX Loading Overlay -->
    <div class="overlay-loading" id="loading-overlay">
      <div class="spinner"></div>
      <h3 style="color: var(--primary-green)">Đang xử lý giao dịch...</h3>
    </div>

    <script src="js/cart.js"></script>
    <div id="paymentModal" class="modal-overlay">
      <div class="modal-content">
        <h2>Thanh Toán Trực Tuyến</h2>
        <p>Số tiền: <strong id="modal-pay-amount">0 đ</strong></p>
        <div class="qr-box">
          <img src="img/paymentQR.png" alt="QR Code">
        </div>
        <div class="modal-buttons">
          <button class="btn-primary" onclick="confirmFakePayment()">ĐÃ THANH TOÁN</button>
          <button class="btn-danger" onclick="closePaymentModal()">HỦY GIAO DỊCH</button>
        </div>
      </div>
    </div>
    
    <div id="successModal" class="modal-overlay">
      <div class="modal-content">
        <h2>✅ Đặt hàng thành công!</h2>
        <p>Đơn hàng của bạn đã được ghi nhận.</p>
        <button class="btn-primary" onclick="window.location.href='history.html'">XEM LỊCH SỬ ĐƠN</button>
      </div>
    </div>

    <div class="overlay-loading" id="loading-overlay">
      <div class="spinner"></div>
      <h3 style="color: var(--primary-green)">Đang xử lý giao dịch...</h3>
    </div>

    <script src="js/cart.js"></script>
  </body>
</html>
  </body>
</html>
